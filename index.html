<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shezw.com — Under Furnishing</title>
<style>
  /* ── Reset & Base ───────────────────────── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0c0c0c;
    font-family: 'Ubuntu Mono', 'Fira Code', 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 14px;
    color: #d4d4d4;
  }

  /* ── Terminal Container ─────────────────── */
  #terminal {
    width: 100%; height: 100%;
    overflow-y: auto;
    padding: 12px 16px;
    scrollbar-width: thin;
    scrollbar-color: #444 #0c0c0c;
  }
  #terminal::-webkit-scrollbar { width: 6px; }
  #terminal::-webkit-scrollbar-track { background: #0c0c0c; }
  #terminal::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

  /* ── Output Lines ───────────────────────── */
  #output > div {
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.5;
    min-height: 1.5em;
  }

  .welcome    { color: #5fd75f; }
  .command-echo { color: #888; }
  .dir        { color: #5f87ff; font-weight: bold; }
  .file       { color: #d4d4d4; }
  .exec       { color: #5fd75f; }
  .error      { color: #ff5f5f; }
  .warn       { color: #d7af5f; }
  .success    { color: #5fd75f; }
  .dim        { color: #666; }

  /* ── Markdown View Styles ───────────────── */
  .md-h1  { color: #ff87af; font-size: 1.6em; font-weight: bold; margin: 8px 0 4px; }
  .md-h2  { color: #ff87af; font-size: 1.35em; font-weight: bold; margin: 6px 0 3px; }
  .md-h3  { color: #ffaf5f; font-size: 1.15em; font-weight: bold; margin: 4px 0 2px; }
  .md-h4  { color: #ffaf5f; font-size: 1.05em; font-weight: bold; }
  .md-h5  { color: #87afff; font-weight: bold; }
  .md-h6  { color: #87afff; font-style: italic; }
  .md-text { color: #d4d4d4; }
  .md-hr   { color: #555; margin: 6px 0; }
  .md-quote { color: #87875f; border-left: 2px solid #555; padding-left: 8px; }
  .md-list  { color: #afd787; }
  .md-code-fence { color: #555; }
  .md-code {
    color: #87d7af;
    background: #1a1a1a;
    padding: 1px 4px;
    font-family: inherit;
  }
  .md-inline-code {
    color: #87d7af;
    background: #1a1a1a;
    padding: 1px 4px;
    border-radius: 2px;
  }
  .md-bold   { color: #ffffff; font-weight: bold; }
  .md-italic { color: #d4d4d4; font-style: italic; }
  .md-link,
  .plain-link {
    color: #87afff;
    text-decoration: underline;
    text-underline-offset: 2px;
    word-break: break-word;
  }
  .md-link:hover,
  .plain-link:hover {
    color: #afd7ff;
  }
  .md-image-wrap {
    margin: 8px 0;
  }
  .md-image-link {
    display: inline-block;
    max-width: 100%;
  }
  .md-image {
    display: block;
    width: auto;
    max-width: min(100%, 1200px);
    max-height: calc(100vh - 48px);
    height: auto;
    object-fit: contain;
    border-radius: 4px;
  }

  /* ── Input Line ─────────────────────────── */
  #input-line {
    display: flex;
    align-items: center;
    line-height: 1.5;
    margin-top: 2px;
  }

  #prompt {
    color: #5fd75f;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    overflow: hidden;
    color: #d4d4d4;
    font-family: inherit;
    font-size: inherit;
    caret-color: #5fd75f;
    line-height: 1.5;
    min-height: 1.5em;
    padding: 0;
  }
  #input.masked {
    -webkit-text-security: disc;
  }

  /* ── Blinking cursor effect ─────────────── */
  #input:focus {
    outline: none;
  }

  /* ── Selection ──────────────────────────── */
  ::selection {
    background: #264f78;
    color: #ffffff;
  }
</style>
</head>
<body>
<div id="terminal">
  <div id="output"></div>
  <div id="input-line">
    <span id="prompt"></span>
    <textarea id="input" rows="1" name="terminal-console" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-form-type="other" data-lpignore="true" enterkeyhint="done" autofocus></textarea>
  </div>
</div>
<script src="filesystem.js"></script>
<script src="terminal.js"></script>
</body>
</html>
